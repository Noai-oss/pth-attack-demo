[project]
name = "pth-attack-demo"
dynamic = ["version"]
description = "A minimal demo showing how a Python package can automatically install a `.pth` file."
readme = "README.md"
authors = [
    { name = "Noai-oss", email = "jiuwoxiao@outlook.com" }
]
requires-python = ">=3.14"
dependencies = []

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[tool.hatch.build.targets.wheel]
packages = ["src/pth_attack_demo"]
artifacts = ["src/pth_attack_demo/_version.py"]

[tool.hatch.build.targets.wheel.force-include]
"attack.pth" = "attack.pth"

[tool.hatch.build.targets.sdist]
artifacts = ["src/pth_attack_demo/_version.py", "attack.pth"]

[tool.hatch.build.hooks.version]
path = "src/pth_attack_demo/_version.py"
template = '''
# This file is generated at build time. Do not edit manually.
__version__ = "{version}"
'''

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { file = "attack.pth" },  { git = { commit = true, tags = true } }]
